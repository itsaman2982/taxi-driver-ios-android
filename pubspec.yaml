name: taxi_driver
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  pinput: ^4.0.0
  provider: ^6.1.5+1
  http: ^1.6.0
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  permission_handler: ^12.0.1
  image_picker: ^1.2.1
  mappls_gl: ^1.2.1
  flutter_launcher_icons: ^0.14.4
  dio: ^5.9.1
  dio_cookie_manager: ^3.3.0
  cookie_jar: ^4.0.8
  path_provider: ^2.1.5
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  socket_io_client: 2.0.2
  camera: ^0.12.0
  image: ^4.8.0
  flutter_webrtc: ^1.3.1
  just_audio: ^0.9.42
  vibration: ^2.0.1
  flutter_local_notifications: ^17.2.1+2
  logger: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

dependency_overrides:
  smart_auth: ^3.2.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/photos/Logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/photos/
    - assets/
    - assets/sounds/
